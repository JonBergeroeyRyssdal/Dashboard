<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random User API</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        .user-card {
            margin-top: 20px;
            border: 1px solid #ccc;
            padding: 15px;
            width: 300px;
        }
        img {
            max-width: 100px;
            border-radius: 50%;
        }
    </style>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>
    <h1>Random User API</h1>
    <button id="fetchUser">Fetch User</button>
    <div id="userCard" class="user-card" style="display: none;">
        <img id="userImage" src="" alt="User Image">
        <p><strong>Name:</strong> <span id="userName"></span></p>
        <p><strong>Surname:</strong> <span id="userSurname"></span></p>
        <p><strong>Email:</strong> <span id="userEmail"></span></p>
    </div>

    <script>
        $('#fetchUser').on('click', function () {
            const userCard = $('#userCard');
            const userImage = $('#userImage');
            const userName = $('#userName');
            const userSurname = $('#userSurname');
            const userEmail = $('#userEmail');

            $.ajax({
                url: 'https://randomuser.me/api/',
                dataType: 'json',
                success: function (data) {
                    const user = data.results[0];

                    // Update the UI with user information
                    userImage.attr('src', user.picture.large);
                    userName.text(user.name.first);
                    userSurname.text(user.name.last);
                    userEmail.text(user.email);

                    userCard.show(); // Show the user card
                },
                error: function (error) {
                    console.error('Error fetching user:', error);
                    alert('Failed to fetch user information.');
                }
            });
        });
    </script>
</body>
</html>
