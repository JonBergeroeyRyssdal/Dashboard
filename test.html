<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random User API</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        .user-card {
            margin-top: 20px;
            border: 1px solid #ccc;
            padding: 15px;
            width: 300px;
        }
        img {
            max-width: 100px;
            border-radius: 50%;
        }
    </style>
</head>
<body>
    <h1>Random User API</h1>
    <button id="fetchUser">Fetch User</button>
    <div id="userCard" class="user-card" style="display: none;">
        <img id="userImage" src="" alt="User Image">
        <p><strong>Name:</strong> <span id="userName"></span></p>
        <p><strong>Surname:</strong> <span id="userSurname"></span></p>
        <p><strong>Email:</strong> <span id="userEmail"></span></p>
    </div>

    <script>
        document.getElementById('fetchUser').addEventListener('click', async () => {
            const userCard = document.getElementById('userCard');
            const userImage = document.getElementById('userImage');
            const userName = document.getElementById('userName');
            const userSurname = document.getElementById('userSurname');
            const userEmail = document.getElementById('userEmail');

            try {
                const response = await fetch('https://randomapi.com/api/ses4o8b0?key=IQMP-42FS-QRXX-XQEU');
                const data = await response.json();
                const user = data.results[0];

                // Update the UI with user information
                userImage.src = user.picture;
                userName.textContent = user.first;
                userSurname.textContent = user.last;
                userEmail.textContent = user.email;
                
                userCard.style.display = 'block'; // Show the user card
            } catch (error) {
                console.error('Error fetching user:', error);
                alert('Failed to fetch user information.');
            }
        });
    </script>
</body>
</html>
